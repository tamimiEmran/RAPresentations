<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAF Structured Results Dashboard</title>
<!--
  Security note: All data rendered in this dashboard comes from local
  structured result JSON files generated by pipeline.restructure_results.
  No user-supplied or external data is rendered. DOM manipulation uses
  a local setH() helper that only processes trusted pipeline output.
-->
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f7f5;--card:#ffffff;--border:#ebe9e6;--text:#37352f;--muted:#9b9a97;
  --accent:#37352f;--green:#2b8a5e;--red:#c4554d;
  --header-bg:#37352f;--header-fg:#f7f7f5;
  --ring:0 0 0 1px rgba(55,53,47,.06);
}
html{font-size:13px}
body{font-family:'Geist',Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

.header{background:var(--header-bg);color:var(--header-fg);padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px}
.header h1{font-size:1.15rem;font-weight:600;letter-spacing:-.02em}
.header .meta{font-size:.8rem;color:#a09f9c}

.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));
  gap:0;padding:0;background:var(--card);border-bottom:1px solid var(--border)}
.kpi{text-align:center;padding:16px 12px;border-right:1px solid var(--border)}
.kpi:last-child{border-right:none}
.kpi .value{font-size:1.6rem;font-weight:600;color:var(--text);letter-spacing:-.03em}
.kpi .value.hi{color:#2b8a5e}
.kpi .label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;font-weight:500}

.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px 20px}
.card{background:var(--card);border-radius:14px;box-shadow:var(--ring);
  overflow:hidden;display:flex;flex-direction:column}
.card.full{grid-column:1/-1}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-header h2{font-size:.85rem;font-weight:600;letter-spacing:-.01em}
.card-header .badge{font-size:.65rem;padding:3px 10px;border-radius:9999px;
  background:var(--bg);color:var(--muted);font-weight:500;border:1px solid var(--border)}
.card-body{padding:12px 16px;flex:1;overflow-x:auto}

table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:transparent;font-weight:600;text-align:left;padding:8px 10px;
  border-bottom:1px solid var(--border);position:sticky;top:0;white-space:nowrap;
  color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
td{padding:7px 10px;border-bottom:1px solid #f0efed;white-space:nowrap}
tr:hover td{background:#faf9f7}
.num{text-align:right;font-variant-numeric:tabular-nums;
  font-family:'Geist Mono','SF Mono',Consolas,monospace;font-size:.8rem}

.tag{display:inline-block;font-size:.6rem;padding:2px 7px;border-radius:9999px;font-weight:500;
  text-transform:uppercase;letter-spacing:.04em}
.tag-ml{background:#f0efed;color:#6b6966;border:1px solid #e3e2df}
.tag-llm{background:#e8deee;color:#6b3fa0}
.tag-sup{background:#edf3ee;color:#5a8a63;border:1px solid #dce8de}
.tag-unsup{background:#fce8e6;color:#c4554d;border:1px solid #f0d3d0}

.bar-cell{position:relative;min-width:80px}
.bar-fill{position:absolute;left:0;top:3px;bottom:3px;border-radius:3px;opacity:.10}
.bar-val{position:relative;z-index:1}

.heatmap{display:grid;gap:2px;font-size:.72rem}
.hm-cell{padding:5px 3px;text-align:center;font-weight:500;border-radius:4px;
  font-variant-numeric:tabular-nums;font-family:'Geist Mono','SF Mono',Consolas,monospace}
.hm-header{font-weight:600;background:transparent;font-size:.62rem;color:var(--muted);
  padding:4px 3px;text-align:center;text-transform:uppercase;letter-spacing:.04em}
.hm-row-label{text-align:right;padding-right:8px;font-weight:500;font-size:.75rem;
  display:flex;align-items:center;justify-content:flex-end;color:var(--text)}

.tab-row{display:flex;gap:0}
.tab{padding:7px 16px;font-size:.75rem;font-weight:500;cursor:pointer;
  border-bottom:2px solid transparent;color:var(--muted);transition:all .15s;
  background:none;border-top:none;border-left:none;border-right:none;letter-spacing:-.01em}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.tab-panel{display:none}
.tab-panel.active{display:block}

canvas{width:100%!important;max-height:320px}
.chart-wrap{position:relative;height:320px}

.scope-toggle{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#f0efed}
.scope-btn{padding:5px 14px;font-size:.72rem;cursor:pointer;border:none;
  background:transparent;color:var(--muted);font-weight:500;transition:all .15s;letter-spacing:-.01em}
.scope-btn.active{background:#fff;color:var(--text);border-radius:8px;box-shadow:0 1px 3px rgba(55,53,47,.1)}

@media(max-width:1100px){.dashboard{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <h1>GAF Energy Theft Detection &mdash; Results Dashboard</h1>
  <div class="meta" id="genMeta"></div>
</div>
<div class="kpi-strip" id="kpiStrip"></div>

      <table id="binTable"><thead></thead><tbody></tbody></table>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><h2>Binary &mdash; Balanced Accuracy</h2></div>
    <div class="card-body"><div class="chart-wrap"><canvas id="binChart"></canvas></div></div>
  </div>
  <div class="card">

    <div class="card-body" style="max-height:440px;overflow-y:auto">
      <table id="mcTable"><thead></thead><tbody></tbody></table>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><h2>Multiclass &mdash; Macro F1</h2></div>
    <div class="card-body"><div class="chart-wrap"><canvas id="mcChart"></canvas></div></div>
  </div>
  <div class="card full">
    <div class="card-header"><h2>Per-Class F1 by Model (Multiclass)</h2></div>
    <div class="card-body" style="overflow-x:auto"><div id="f1Heatmap"></div></div>
  </div>
  <div class="card full">
    <div class="card-header"><h2>Per-Attack Detection Rate (Binary)</h2></div>
    <div class="card-body" style="overflow-x:auto"><div id="attackHeatmap"></div></div>
  </div>
  <div class="card full">
    <div class="card-header">
      <h2>Stability &mdash; Sample Size Curves</h2>
      <div class="tab-row" id="stabTabs">
        <button class="tab active" data-tab="stabBinary">Binary BA</button>
        <button class="tab" data-tab="stabMulti">Multiclass F1</button>
      </div>
    </div>
    <div class="card-body">
      <div id="stabBinary" class="tab-panel active"><div class="chart-wrap"><canvas id="stabBinChart"></canvas></div></div>
      <div id="stabMulti" class="tab-panel"><div class="chart-wrap"><canvas id="stabMcChart"></canvas></div></div>
    </div>
  </div>
  <div class="card full">
    <div class="card-header">
      <h2>Confusion Matrix</h2>
      <select id="cmSelect" style="font-size:.78rem;padding:3px 8px;border:1px solid var(--border);border-radius:4px"></select>
    </div>
    <div class="card-body" style="overflow-x:auto"><div id="cmHeatmap"></div></div>
  </div>
</div>

function fMc(){return DATA.multiclass.filter(function(d){return noQ(d)&&(d.category==="llm"||d.dataset_scope===mlScope)})}
function hC(v,lo,hi){if(v==null||isNaN(v))return"#f7f7f5";var t=Math.max(0,Math.min(1,(v-lo)/(hi-lo)));
  var r=Math.round(240-t*155),g=Math.round(238-t*100),b=Math.round(233-t*135);
  return"rgb("+r+","+g+","+b+")"}
function hT(v,lo,hi){return Math.max(0,Math.min(1,(v-lo)/(hi-lo)))>0.6?"#fff":"#37352f"}

/* Trusted-data DOM helper: only called with pipeline-generated content */
function setH(el,h){el.innerHTML=h}

function renderKPIs(){
  var bin=fBin(),mc=fMc();
  var bestBA=bin.reduce(function(a,b){return b.metrics.balanced_accuracy>a.metrics.balanced_accuracy?b:a});
  var bestF1=mc.reduce(function(a,b){return b.metrics.macro_f1>a.metrics.macro_f1?b:a});
  setH(document.getElementById("kpiStrip"),
    '<div class="kpi"><div class="value">'+bin.length+'</div><div class="label">Binary Results</div></div>'+
    '<div class="kpi"><div class="value">'+mc.length+'</div><div class="label">Multiclass Results</div></div>'+
    '<div class="kpi"><div class="value hi">'+pct(bestBA.metrics.balanced_accuracy)+'</div><div class="label">Best Binary BA · '+bestBA.model_display+'</div></div>'+
    '<div class="kpi"><div class="value hi">'+pct(bestF1.metrics.macro_f1)+'</div><div class="label">Best Macro-F1 · '+bestF1.model_display+'</div></div>'+
    '<div class="kpi"><div class="value">8</div><div class="label">Models Evaluated</div></div>');
  document.getElementById("genMeta").textContent="Generated "+new Date().toLocaleDateString();
}

function renderBinTable(){
  var rows=fBin().sort(function(a,b){return b.metrics.balanced_accuracy-a.metrics.balanced_accuracy});
  document.getElementById("binCount").textContent=rows.length+" models";
  setH(document.querySelector("#binTable thead"),
    '<tr><th>Model</th><th>Type</th><th>Scope</th><th class="num">Bal.Acc</th><th class="num">F1</th><th class="num">Prec</th><th class="num">Rec</th><th class="num">Spec</th><th class="num">AUC</th><th class="num">n</th></tr>');
  var tb="";
  rows.forEach(function(d){var m=d.metrics;
    var cat=d.category==="ml"?'<span class="tag tag-ml">ML</span>':'<span class="tag tag-llm">LLM</span>';
    var sub=d.subcategory==="unsupervised"?' <span class="tag tag-unsup">unsup</span>':d.subcategory==="supervised"?' <span class="tag tag-sup">sup</span>':"";
    var sc=d.dataset_scope==="full_holdout"?"Full":"Sub-97";var c=MC[d.model]||"#6b7280";
    tb+='<tr><td><strong>'+d.model_display+'</strong></td><td>'+cat+sub+'</td><td>'+sc+'</td>'+
      '<td class="num bar-cell"><div class="bar-fill" style="width:'+m.balanced_accuracy*100+'%;background:'+c+'"></div><span class="bar-val">'+fmt(m.balanced_accuracy)+'</span></td>'+
      '<td class="num">'+fmt(m.f1)+'</td><td class="num">'+fmt(m.precision)+'</td><td class="num">'+fmt(m.recall)+'</td>'+
      '<td class="num">'+fmt(m.specificity)+'</td><td class="num">'+(m.auc_roc&&!isNaN(m.auc_roc)?fmt(m.auc_roc):"---")+'</td>'+
      '<td class="num">'+d.n_samples.toLocaleString()+'</td></tr>';});
  setH(document.querySelector("#binTable tbody"),tb);
}

var binCI=null;
function renderBinChart(){
  var rows=fBin().sort(function(a,b){return b.metrics.balanced_accuracy-a.metrics.balanced_accuracy});
  var labels=rows.map(function(d){return d.model_display});
  var colors=rows.map(function(d){return MC[d.model]||"#6b7280"});
  if(binCI)binCI.destroy();
  binCI=new Chart(document.getElementById("binChart"),{type:"bar",data:{labels:labels,datasets:[
    {label:"Balanced Accuracy",data:rows.map(function(d){return d.metrics.balanced_accuracy}),backgroundColor:colors.map(function(c){return c+"cc"}),borderColor:colors,borderWidth:1}
  ]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",
    scales:{x:{min:0,max:1,ticks:{callback:function(v){return pct(v,0)}}}},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return pct(ctx.raw)}}}}}});
}

function renderMcTable(){
  var rows=fMc().sort(function(a,b){return b.metrics.macro_f1-a.metrics.macro_f1});
  document.getElementById("mcCount").textContent=rows.length+" models";
  setH(document.querySelector("#mcTable thead"),
    '<tr><th>Model</th><th>Type</th><th>Scope</th><th class="num">Bal.Acc</th><th class="num">Macro F1</th><th class="num">Wtd F1</th><th class="num">n</th><th class="num">Excl</th></tr>');
  var tb="";
  rows.forEach(function(d){var m=d.metrics;
    var cat=d.category==="ml"?'<span class="tag tag-ml">ML</span>':'<span class="tag tag-llm">LLM</span>';
    var sc=d.dataset_scope==="full_holdout"?"Full":"Sub-97";var c=MC[d.model]||"#6b7280";
    tb+='<tr><td><strong>'+d.model_display+'</strong></td><td>'+cat+'</td><td>'+sc+'</td>'+
      '<td class="num bar-cell"><div class="bar-fill" style="width:'+m.balanced_accuracy*100+'%;background:'+c+'"></div><span class="bar-val">'+fmt(m.balanced_accuracy)+'</span></td>'+
      '<td class="num">'+fmt(m.macro_f1)+'</td><td class="num">'+fmt(m.weighted_f1)+'</td>'+
      '<td class="num">'+d.n_samples.toLocaleString()+'</td><td class="num">'+d.n_excluded+'</td></tr>';});
  setH(document.querySelector("#mcTable tbody"),tb);

function renderF1Heat(){
  var rows=fMc().sort(function(a,b){return b.metrics.macro_f1-a.metrics.macro_f1});
  if(!rows.length)return;var cls=rows[0].class_order;
  var h='<div class="heatmap" style="grid-template-columns:140px repeat('+cls.length+',1fr)">';
  h+='<div class="hm-header"></div>';
  cls.forEach(function(c){h+='<div class="hm-header">'+(c==="original"?"orig":c.replace("attack","A"))+'</div>'});
  rows.forEach(function(d){h+='<div class="hm-row-label">'+d.model_display+'</div>';
    d.metrics.per_class.forEach(function(pc){var bg=hC(pc.f1,0.3,1.0);var fg=hT(pc.f1,0.3,1.0);
      h+='<div class="hm-cell" style="background:'+bg+';color:'+fg+'" title="'+pc.scenario+': P='+fmt(pc.precision,3)+' R='+fmt(pc.recall,3)+' F1='+fmt(pc.f1,3)+'">'+fmt(pc.f1,3)+'</div>';});});
  h+='</div>';setH(document.getElementById("f1Heatmap"),h);
}

function renderAttackHeat(){
  var attacks=["original","attack0","attack1","attack2","attack3","attack4","attack5","attack6","attack7","attack9","attack10","attack12","attackieee"];
  var models=[],mdata={};
  for(var key in DATA.perAttack){if(key.indexOf("ml__")===0)continue;
    var parts=key.split("__");var slug=parts[0];
    if(HIDE[slug])continue;
    var binE=DATA.binary.find(function(b){return b.model===slug});
    models.push({slug:slug,display:binE?binE.model_display:slug});
    var vals={};DATA.perAttack[key].forEach(function(r){vals[r.scenario]=parseFloat(r.value)});mdata[slug]=vals;}
  if(!models.length)return;
  var h='<div class="heatmap" style="grid-template-columns:140px repeat('+attacks.length+',1fr)">';
  h+='<div class="hm-header"></div>';
  attacks.forEach(function(a){h+='<div class="hm-header">'+(a==="original"?"orig":a.replace("attack","A"))+'</div>'});
  models.forEach(function(m){h+='<div class="hm-row-label">'+m.display+'</div>';
    attacks.forEach(function(a){var v=mdata[m.slug]?mdata[m.slug][a]:null;
      if(v==null){h+='<div class="hm-cell" style="background:#f3f4f6">---</div>'}
      else{var bg=hC(v,0.4,1.0);var fg=hT(v,0.4,1.0);
        h+='<div class="hm-cell" style="background:'+bg+';color:'+fg+'" title="'+a+': '+pct(v)+'">'+fmt(v,3)+'</div>'}});});
  h+='</div>';setH(document.getElementById("attackHeatmap"),h);
}

var LLM_STAB=[
  {slug:"deepseek_v4_pro",id:"E010",display:"DeepSeek V4 Pro"},
  {slug:"deepseek_v4_flash",id:"E011",display:"DeepSeek V4 Flash"},
  {slug:"gemini_pro",id:"GEM01",display:"Gemini Pro"},
  {slug:"gemini_flash",id:"GEM02",display:"Gemini Flash"}
];
function llmCurveDatasets(curveType){
  var ds=[];
  LLM_STAB.forEach(function(spec){
    var key="llm_"+spec.slug+"__"+spec.id+"__subset_97__"+curveType;
    var entry=DATA.stability[key];
    if(!entry||!entry.data||!entry.data.points)return;
    var pts=entry.data.points.filter(function(p){return p.n>=5});
    var c=MC[spec.slug]||"#6b7280";
    ds.push({label:spec.display,data:pts.map(function(p){return{x:p.n,y:p.median}}),
      borderColor:c,backgroundColor:c+"20",pointRadius:0,borderWidth:2,
      borderDash:[6,4],tension:0.3,order:1});
    ds.push({label:spec.slug+"_hi",data:pts.map(function(p){return{x:p.n,y:p.p75}}),
      borderColor:"transparent",backgroundColor:c+"12",pointRadius:0,borderWidth:0,
      fill:"+1",tension:0.3,order:2});
    ds.push({label:spec.slug+"_lo",data:pts.map(function(p){return{x:p.n,y:p.p25}}),
      borderColor:"transparent",backgroundColor:"transparent",pointRadius:0,
      borderWidth:0,tension:0.3,order:2});
  });
  return ds;
}

var sBinI=null,sMcI=null;
function renderStab(){
  var bk="binary__run20260418__"+mlScope,mk="multiclass__run20260418__"+mlScope;
  var bd=DATA.stability[bk],md=DATA.stability[mk];
  if(bd&&bd.data&&bd.data.binary){var ds=[];
    Object.keys(bd.data.binary).forEach(function(model){
      var pts=bd.data.binary[model].filter(function(p){return p.n>=5});var c=MC[model]||"#6b7280";
      ds.push({label:model.charAt(0).toUpperCase()+model.slice(1),data:pts.map(function(p){return{x:p.n,y:p.median}}),borderColor:c,backgroundColor:c+"20",pointRadius:0,borderWidth:2,tension:0.3,order:1});
      ds.push({label:model+"_hi",data:pts.map(function(p){return{x:p.n,y:p.p75}}),borderColor:"transparent",backgroundColor:c+"15",pointRadius:0,borderWidth:0,fill:"+1",tension:0.3,order:2});
      ds.push({label:model+"_lo",data:pts.map(function(p){return{x:p.n,y:p.p25}}),borderColor:"transparent",backgroundColor:"transparent",pointRadius:0,borderWidth:0,tension:0.3,order:2});});
    ds=ds.concat(llmCurveDatasets("binary"));
    if(sBinI)sBinI.destroy();
    sBinI=new Chart(document.getElementById("stabBinChart"),{type:"line",data:{datasets:ds},options:{
      responsive:true,maintainAspectRatio:false,
      scales:{x:{type:"logarithmic",title:{display:true,text:"Sample Size (n)"},ticks:{callback:function(v){if([10,100,1000,10000,100000,1000000].indexOf(v)>=0)return v.toLocaleString();return""}}},
        y:{min:0.4,max:1.0,title:{display:true,text:"Balanced Accuracy"},ticks:{callback:function(v){return pct(v,0)}}}},
      plugins:{legend:{labels:{filter:function(item){return item.text.indexOf("_")<0}}},
        tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label.indexOf("_")>=0?"":ctx.dataset.label+": "+pct(ctx.raw.y)}}}}}});}
  if(md&&md.data&&md.data.multiclass_catboost){
    var pts=md.data.multiclass_catboost.filter(function(p){return p.n>=5});
    var mcDs=[
      {label:"CatBoost Macro-F1",data:pts.map(function(p){return{x:p.n,y:p.median}}),borderColor:"#2563eb",backgroundColor:"#2563eb20",pointRadius:0,borderWidth:2,tension:0.3,order:1},
      {label:"catboost_hi",data:pts.map(function(p){return{x:p.n,y:p.p75}}),borderColor:"transparent",backgroundColor:"#2563eb15",pointRadius:0,fill:"+1",tension:0.3,order:2},
      {label:"catboost_lo",data:pts.map(function(p){return{x:p.n,y:p.p25}}),borderColor:"transparent",backgroundColor:"transparent",pointRadius:0,tension:0.3,order:2}
    ];
    mcDs=mcDs.concat(llmCurveDatasets("multiclass"));
    if(sMcI)sMcI.destroy();
    sMcI=new Chart(document.getElementById("stabMcChart"),{type:"line",data:{datasets:mcDs},options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{type:"logarithmic",title:{display:true,text:"Sample Size (n)"},ticks:{callback:function(v){if([10,100,1000,10000,100000,1000000].indexOf(v)>=0)return v.toLocaleString();return""}}},
        y:{min:0.3,max:1.0,title:{display:true,text:"Macro F1"},ticks:{callback:function(v){return pct(v,0)}}}},
      plugins:{legend:{labels:{filter:function(item){return item.text.indexOf("_")<0}}},
        tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label.indexOf("_")>=0?"":ctx.dataset.label+": "+pct(ctx.raw.y)}}}}}});}
}

function renderCMSel(){
  var sel=document.getElementById("cmSelect"),opts=fMc().sort(function(a,b){return b.metrics.macro_f1-a.metrics.macro_f1});
  var oh="";opts.forEach(function(d){oh+='<option value="'+d.result_id+'">'+d.model_display+' ('+d.category.toUpperCase()+', '+(d.dataset_scope==="full_holdout"?"Full":"Sub-97")+')</option>'});
  setH(sel,oh);sel.onchange=function(){renderCM(sel.value)};if(opts.length)renderCM(opts[0].result_id);
}
function renderCM(rid){
  var d=fMc().find(function(x){return x.result_id===rid});if(!d)return;
  var cm=d.metrics.confusion_matrix,cls=d.class_order,mx=0;
  cm.forEach(function(row){row.forEach(function(v){if(v>mx)mx=v})});
  var h='<div class="heatmap" style="grid-template-columns:80px repeat('+cls.length+',1fr)">';
  h+='<div class="hm-header">Pred →</div>';
  cls.forEach(function(c){h+='<div class="hm-header">'+(c==="original"?"orig":c.replace("attack","A"))+'</div>'});
  cls.forEach(function(rc,i){h+='<div class="hm-row-label" style="font-size:.65rem">'+(rc==="original"?"orig":rc.replace("attack","A"))+'</div>';
    cls.forEach(function(_,j){var v=cm[i][j];var t=mx>0?v/mx:0;var bg,fg;
      if(i===j){var s=Math.min(1,t*2);bg="rgba(91,143,185,"+(0.08+s*0.55)+")";fg=s>0.45?"#fff":"#37352f"}
      else{var s2=Math.min(1,t*3);bg=v===0?"#faf9f7":"rgba(196,85,77,"+(0.06+s2*0.4)+")";fg=s2>0.35?"#fff":"#37352f"}
      h+='<div class="hm-cell" style="background:'+bg+';color:'+fg+';font-size:.65rem" title="True: '+rc+', Pred: '+cls[j]+', n='+v+'">'+v+'</div>';});});
  h+='</div>';setH(document.getElementById("cmHeatmap"),h);
}

document.getElementById("stabTabs").addEventListener("click",function(e){
  var tab=e.target.closest(".tab");if(!tab)return;
  document.querySelectorAll("#stabTabs .tab").forEach(function(t){t.classList.remove("active")});
  tab.classList.add("active");
  document.querySelectorAll("#stabBinary,#stabMulti").forEach(function(p){p.classList.remove("active")});
  document.getElementById(tab.dataset.tab).classList.add("active");});

document.getElementById("scopeToggle").addEventListener("click",function(e){
  var btn=e.target.closest(".scope-btn");if(!btn)return;
  document.querySelectorAll(".scope-btn").forEach(function(b){b.classList.remove("active")});
  btn.classList.add("active");mlScope=btn.dataset.scope;renderAll();});

function renderAll(){renderKPIs();renderBinTable();renderBinChart();renderMcTable();renderMcChart();renderF1Heat();renderAttackHeat();renderStab();renderCMSel()}
renderAll();
</script>
